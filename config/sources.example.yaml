# DailyReport Data Source Configuration
# Copy this file to sources.yaml and customize

arxiv:
  categories:
    - cs.AI        # Artificial Intelligence
    - cs.CL        # Computation and Language
    - cs.CV        # Computer Vision
    - cs.LG        # Machine Learning
  max_results_per_category: 50

hackernews:
  min_score: 50
  max_items: 30
  keywords:
    - AI
    - LLM
    - machine learning

youtube:
  channels:
    # Find channel ID: YouTube channel page -> About -> Share -> Copy channel ID
    - name: "AI Explained"
      channel_id: "UCNJ1Ymd5yFuUPtn21xtRZQ"
  max_results_per_channel: 5

bilibili:
  users: []
  # - name: "UP Name"
  #   uid: 123456789
  max_results_per_user: 5

semantic_scholar:
  topics:
    - "large language models"
    - "AI agents"
  max_results: 50

github_trending:
  languages:
    - python
    - ""
  since: daily
  max_items: 30

product_hunt:
  topics:
    - "artificial-intelligence"
  max_items: 20

tavily:
  searches:
    - name: "OpenAI Blog"
      query: "site:openai.com/blog"
    - name: "Anthropic News"
      query: "site:anthropic.com/research OR site:anthropic.com/news"
  max_results_per_search: 5
  search_depth: basic
